<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Check-in Tamu Pernikahan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script>
  window.__scriptLoadErrors = [];
  window.reportScriptLoadError = function(name){
    window.__scriptLoadErrors.push(name);
  };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.4.4/qrcode.min.js" crossorigin="anonymous" onerror="reportScriptLoadError('qrcode.min.js (gagal DIMUAT dari server)')"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" crossorigin="anonymous" onerror="reportScriptLoadError('jsQR.js (gagal DIMUAT dari server)')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js" crossorigin="anonymous" onerror="reportScriptLoadError('firebase-app-compat.js (gagal DIMUAT dari server)')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.min.js" crossorigin="anonymous" onerror="reportScriptLoadError('firebase-firestore-compat.js (gagal DIMUAT dari server)')"></script>
<style>
  :root{
    --ivory:#FAF6F0;
    --paper:#FFFFFF;
    --charcoal:#2E2A25;
    --charcoal-soft:#6B6255;
    --gold:#AD8A55;
    --gold-deep:#8C6D3E;
    --gold-light:#EFE3CC;
    --sage:#5F7A5A;
    --sage-bg:#E4EBE0;
    --brick:#AD4E45;
    --brick-bg:#F5DFDB;
    --amber:#9C7A2E;
    --amber-bg:#F2E8CE;
    --line:#E5DDCC;
    --shadow: 0 12px 40px rgba(46,42,37,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ivory);
    color:var(--charcoal);
    font-family:'Manrope',sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  .display{font-family:'Playfair Display', serif;}
  .mono{font-family:'JetBrains Mono', monospace;}
  #app{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- flourish ---------- */
  .flourish{width:120px;height:24px;margin:0 auto 18px;display:block;opacity:.75;}

  /* ---------- gate screens ---------- */
  .gate-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;
  }
  .gate-card{
    width:100%;max-width:380px;background:var(--paper);border:1px solid var(--line);
    border-radius:4px;padding:40px 32px 32px;box-shadow:var(--shadow);text-align:center;
    position:relative;
  }
  .gate-card::before{
    content:"";position:absolute;inset:10px;border:1px solid var(--gold-light);border-radius:2px;pointer-events:none;
  }
  .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);
    font-weight:700;margin-bottom:6px;
  }
  .gate-title{font-size:26px;font-weight:600;margin:0 0 4px;color:var(--charcoal);}
  .gate-sub{font-size:13.5px;color:var(--charcoal-soft);margin:0 0 24px;line-height:1.5;}
  .field{margin-bottom:14px;text-align:left;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--charcoal-soft);margin-bottom:6px;letter-spacing:.02em;}
  input[type=text],input[type=password],select,textarea{
    width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:3px;
    font-family:'Manrope',sans-serif;font-size:15px;background:var(--ivory);color:var(--charcoal);
    outline:none;transition:border-color .15s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--gold);background:var(--paper);}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 20px;border-radius:3px;border:1px solid var(--charcoal);
    background:var(--charcoal);color:var(--ivory);font-family:'Manrope',sans-serif;
    font-size:14px;font-weight:700;letter-spacing:.02em;cursor:pointer;width:100%;
    transition:transform .1s, background .15s;
  }
  .btn:active{transform:scale(.98);}
  .btn:hover{background:#453e34;}
  .btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;}
  .btn-gold:hover{background:var(--gold-deep);}
  .btn-outline{background:transparent;color:var(--charcoal);}
  .btn-outline:hover{background:var(--gold-light);}
  .btn-sm{padding:8px 14px;font-size:13px;width:auto;}
  .btn-danger{background:var(--brick);border-color:var(--brick);}
  .btn-danger:hover{background:#8f3e37;}
  .error-msg{color:var(--brick);font-size:13px;margin:10px 0 0;font-weight:600;}
  .hint-msg{color:var(--charcoal-soft);font-size:12.5px;margin-top:14px;line-height:1.5;}

  /* ---------- shake ---------- */
  @keyframes shake{
    0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);}
    60%{transform:translateX(-6px);} 80%{transform:translateX(6px);}
  }
  .shake{animation:shake .4s;}

  /* ---------- dashboard ---------- */
  header.top{
    background:var(--paper);border-bottom:1px solid var(--line);padding:16px 20px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;
  }
  header.top h1{font-size:17px;margin:0;font-weight:600;}
  header.top .stat{font-size:12px;color:var(--charcoal-soft);margin-top:2px;}
  .tabs{display:flex;background:var(--paper);border-bottom:1px solid var(--line);padding:0 20px;}
  .tab{
    padding:14px 4px;margin-right:26px;font-size:13.5px;font-weight:700;color:var(--charcoal-soft);
    border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.02em;
  }
  .tab.active{color:var(--charcoal);border-bottom-color:var(--gold);}
  main.content{flex:1;padding:20px;max-width:640px;width:100%;margin:0 auto;}

  /* ---------- guest list ---------- */
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:18px;margin-bottom:16px;}
  .panel h2{font-size:14px;margin:0 0 12px;font-weight:700;letter-spacing:.02em;}
  .row-2{display:flex;gap:10px;}
  .row-2 .field{flex:1;}
  .toggle-bulk{font-size:12.5px;color:var(--gold-deep);font-weight:700;cursor:pointer;margin-top:2px;display:inline-block;}
  .guest-search{margin-bottom:12px;}
  .guest-item{
    display:flex;align-items:center;justify-content:space-between;padding:12px 4px;
    border-bottom:1px solid var(--line);gap:10px;
  }
  .guest-item:last-child{border-bottom:none;}
  .guest-name{font-weight:700;font-size:14.5px;}
  .guest-meta{font-size:12px;color:var(--charcoal-soft);margin-top:2px;}
  .badge{
    display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
    letter-spacing:.02em;white-space:nowrap;
  }
  .badge-hadir{background:var(--sage-bg);color:var(--sage);}
  .badge-belum{background:var(--gold-light);color:var(--gold-deep);}
  .guest-actions{display:flex;align-items:center;gap:8px;}
  .empty-state{text-align:center;padding:30px 10px;color:var(--charcoal-soft);font-size:13.5px;line-height:1.6;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(46,42,37,.55);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:20px;
  }
  .modal{
    background:var(--paper);border-radius:6px;padding:28px;max-width:340px;width:100%;text-align:center;
    box-shadow:var(--shadow);
  }
  .modal img{width:220px;height:220px;border:1px solid var(--line);border-radius:4px;margin:14px 0;}
  .modal .code{font-size:13px;color:var(--charcoal-soft);letter-spacing:.05em;}

  /* ---------- scan tab ---------- */
  .scan-frame{
    position:relative;width:100%;max-width:340px;aspect-ratio:1/1;margin:0 auto;border-radius:8px;
    overflow:hidden;background:#1c1a17;border:2px solid var(--gold);
  }
  .scan-frame video{width:100%;height:100%;object-fit:cover;}
  .scan-frame .corner{
    position:absolute;width:34px;height:34px;border-color:var(--gold-light);pointer-events:none;
  }
  .scan-idle{
    color:var(--ivory);opacity:.75;font-size:13px;text-align:center;position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .scan-controls{display:flex;gap:10px;max-width:340px;margin:14px auto 0;}
  .seal-wrap{max-width:340px;margin:22px auto 0;text-align:center;min-height:150px;}
  .seal{
    width:110px;height:110px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;
    margin:0 auto 12px;animation:seal-stamp .35s cubic-bezier(.2,1.4,.5,1);
  }
  @keyframes seal-stamp{
    0%{transform:scale(1.6);opacity:0;} 100%{transform:scale(1);opacity:1;}
  }
  .seal svg{width:44px;height:44px;}
  .seal-valid{border-color:var(--sage);color:var(--sage);}
  .seal-dup{border-color:var(--amber);color:var(--amber);}
  .seal-invalid{border-color:var(--brick);color:var(--brick);}
  .seal-name{font-size:17px;font-weight:700;margin:0 0 2px;}
  .seal-sub{font-size:12.5px;color:var(--charcoal-soft);}
  .manual-check{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);max-width:340px;margin-left:auto;margin-right:auto;}
  .manual-check label{display:block;font-size:12px;font-weight:700;color:var(--charcoal-soft);margin-bottom:6px;}
  .manual-row{display:flex;gap:8px;}
  .manual-row input{flex:1;}

  @media (max-width:420px){
    main.content{padding:16px;}
    .gate-card{padding:32px 22px 26px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<canvas id="scan-canvas" style="display:none;"></canvas>
<div id="debug-error-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#AD4E45;color:#fff;padding:10px 14px;font-family:sans-serif;font-size:12.5px;z-index:9999;word-break:break-word;"></div>
<script>
  window.addEventListener("error", function(ev){
    var banner = document.getElementById("debug-error-banner");
    if(!banner) return;
    var msg = ev && ev.message ? ev.message : "Unknown error";
    var loc = (ev && ev.filename) ? (" (" + ev.filename.split("/").pop() + ":" + ev.lineno + ")") : "";
    banner.textContent = "Debug error: " + msg + loc;
    banner.style.display = "block";
  });
</script>
<script>
(function(){
  "use strict";

  const CATEGORIES = ["Keluarga","Kerabat","Rekan Kerja","VIP","Umum"];
  const DEVICE_UNLOCK_KEY = "wedding-qr-device-unlocked";
  const GUESTS_COLLECTION = "wedding_checkin_guests";
  const CONFIG_COLLECTION = "wedding_checkin_config";

  // ====================================================================
  // WAJIB DIISI SEBELUM DI-HOST: konfigurasi Firebase kalian sendiri.
  // Tanpa ini, data (PIN & daftar tamu) TIDAK akan tersimpan/tersinkron
  // antar HP panitia. Cara dapetin nilainya (gratis, ~5 menit):
  //   1. Buka https://console.firebase.google.com, buat project baru.
  //   2. Di menu kiri: Build > Firestore Database > "Create database"
  //      > pilih lokasi > mulai di "Test mode" (biar gampang, tapi ini
  //      artinya siapa pun yang tau alamat website ini + config di bawah
  //      bisa baca/ubah data tamu — cukup aman untuk acara 1 hari, tapi
  //      kalau mau lebih ketat, atur Firestore Security Rules nanti).
  //   3. Project settings (ikon gerigi) > scroll ke "Your apps" >
  //      klik ikon web "</>" > daftarkan app > copy object
  //      "firebaseConfig" yang muncul > tempel nilainya di bawah ini.
  // ====================================================================
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBY9UK-W9WH9fyoCZwh7iAwPwlrewhX774",
    authDomain: "qr-code-tamu.firebaseapp.com",
    projectId: "qr-code-tamu",
    storageBucket: "qr-code-tamu.firebasestorage.app",
    messagingSenderId: "567680381492",
    appId: "1:567680381492:web:751ec2576db13eab899061"
  };

  let state = {
    screen: "loading", // loading | setup-pin | login | dashboard
    pin: null,
    guests: [],
    activeTab: "guests",
    search: "",
    bulkOpen: false,
    modalGuest: null,
    scanning: false,
    scanLocked: false,
    cameraStream: null,
    cameraError: null,
    loginError: false,
    selectedIds: new Set(),
  };

  // ---------------- storage helpers (Firebase Firestore) ----------------
  let db = null;
  let firebaseReady = false;
  let firebaseInitError = null; // "not-configured" | error message string

  function initFirebase(){
    if(!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId){
      firebaseInitError = "not-configured";
      return;
    }
    try{
      if(typeof firebase === "undefined"){
        firebaseInitError = "Library Firebase gagal dimuat (cek koneksi internet / pemblokir skrip).";
        return;
      }
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      firebaseReady = true;
    }catch(e){
      firebaseInitError = (e && e.message) ? e.message : String(e);
    }
  }

  function storageNotReadyMessage(){
    if(firebaseInitError === "not-configured"){
      return "Firebase belum dikonfigurasi. Buka file HTML ini, isi bagian FIREBASE_CONFIG di dekat awal <script>, lalu upload ulang.";
    }
    return "Firebase gagal terhubung: " + (firebaseInitError || "penyebab tidak diketahui");
  }

  async function loadPin(){
    if(!firebaseReady) return null;
    try{
      const snap = await db.collection(CONFIG_COLLECTION).doc("pin").get();
      return snap.exists ? snap.data().value : null;
    }catch(e){
      // a "not found"/permission error on first run is expected and just means no PIN yet
      return null;
    }
  }
  async function savePinValue(pin){
    if(!firebaseReady) return { ok:false, message: storageNotReadyMessage() };
    try{
      await db.collection(CONFIG_COLLECTION).doc("pin").set({ value: pin });
      return { ok:true };
    }catch(e){
      return { ok:false, message: (e && e.message) ? e.message : String(e) };
    }
  }
  async function loadGuestsFromStorage(){
    if(!firebaseReady) return [];
    try{
      const snap = await db.collection(GUESTS_COLLECTION).get();
      const list = [];
      snap.forEach(doc => list.push(doc.data()));
      return list;
    }catch(e){ return []; }
  }
  async function saveGuestsToStorage(list){
    if(!firebaseReady) return { ok:false, message: storageNotReadyMessage() };
    try{
      // Write each guest to its own document (id = kode tamu) instead of one
      // big blob, so two panitia checking in different guests at the same
      // moment can't clobber each other's writes. Chunked to stay under
      // Firestore's 500-ops-per-batch limit (safe margin for big guest lists).
      for(let i=0;i<list.length;i+=450){
        const chunk = list.slice(i, i+450);
        const batch = db.batch();
        chunk.forEach(g => batch.set(db.collection(GUESTS_COLLECTION).doc(g.id), g));
        await batch.commit();
      }
      return { ok:true };
    }catch(e){
      return { ok:false, message: (e && e.message) ? e.message : String(e) };
    }
  }

  function genId(existing){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let id;
    do{
      let s = "";
      for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
      id = "W-" + s;
    } while(existing.some(g=>g.id===id));
    return id;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function fmtTime(ts){
    if(!ts) return "";
    const d = new Date(ts);
    return d.toLocaleString("id-ID", {hour:"2-digit",minute:"2-digit",day:"2-digit",month:"short"});
  }

  async function getDeviceUnlocked(){
    try{ return localStorage.getItem(DEVICE_UNLOCK_KEY) === "true"; }
    catch(e){ return false; }
  }
  async function setDeviceUnlocked(val){
    try{
      if(val) localStorage.setItem(DEVICE_UNLOCK_KEY, "true");
      else localStorage.removeItem(DEVICE_UNLOCK_KEY);
    }catch(e){ /* non-fatal */ }
  }

  // ---------------- init ----------------
  async function init(){
    initFirebase();
    if(!firebaseReady){
      state.screen = "firebase-setup";
      render();
      return;
    }
    state.pin = await loadPin();
    if(!state.pin){
      state.screen = "setup-pin";
      render();
      return;
    }
    const deviceUnlocked = await getDeviceUnlocked();
    if(deviceUnlocked){
      state.guests = await loadGuestsFromStorage();
      state.screen = "dashboard";
      state.activeTab = "guests";
    } else {
      state.screen = "login";
    }
    render();
  }

  // ---------------- actions: gate ----------------
  window.handleSetupPin = async function(){
    const v1 = document.getElementById("setup-pin-1").value.trim();
    const v2 = document.getElementById("setup-pin-2").value.trim();
    const errEl = document.getElementById("setup-pin-error");
    if(v1.length < 4){ errEl.textContent = "PIN minimal 4 karakter."; return; }
    if(v1 !== v2){ errEl.textContent = "Konfirmasi PIN tidak cocok."; return; }
    const result = await savePinValue(v1);
    if(!result.ok){ errEl.textContent = "Gagal menyimpan PIN: " + result.message; return; }
    if(result.fallback){ errEl.style.color = "var(--amber)"; errEl.textContent = "Catatan: penyimpanan permanen tidak tersedia di lingkungan ini, PIN hanya berlaku untuk sesi ini."; }
    state.pin = v1;
    state.screen = "login";
    render();
  };

  window.handleLogin = async function(){
    const v = document.getElementById("login-pin").value.trim();
    if(v === state.pin){
      await setDeviceUnlocked(true);
      state.guests = await loadGuestsFromStorage();
      state.screen = "dashboard";
      state.activeTab = "guests";
      render();
    } else {
      state.loginError = true;
      render();
      const card = document.querySelector(".gate-card");
      if(card){ card.classList.add("shake"); setTimeout(()=>card.classList.remove("shake"), 400); }
    }
  };

  window.handleLogout = async function(){
    stopCamera();
    await setDeviceUnlocked(false);
    state.screen = "login";
    state.activeTab = "guests";
    state.loginError = false;
    render();
  };

  // ---------------- actions: guests ----------------
  window.setTab = function(tab){
    if(state.activeTab === "scan" && tab !== "scan") stopCamera();
    state.activeTab = tab;
    render();
    if(tab === "guests") refreshGuests();
  };

  async function refreshGuests(){
    const fresh = await loadGuestsFromStorage();
    state.guests = fresh;
    if(state.activeTab === "guests") renderGuestListOnly();
  }

  window.toggleBulk = function(){
    state.bulkOpen = !state.bulkOpen;
    render();
  };

  window.handleSearch = function(val){
    state.search = val;
    renderGuestListOnly();
  };

  window.toggleGuestSelect = function(id, checked){
    if(checked) state.selectedIds.add(id);
    else state.selectedIds.delete(id);
    updateSelectedCountUI();
  };

  window.toggleSelectAllVisible = function(checked){
    const q = state.search.trim().toLowerCase();
    state.guests
      .filter(g => !q || g.name.toLowerCase().includes(q))
      .forEach(g => { if(checked) state.selectedIds.add(g.id); else state.selectedIds.delete(g.id); });
    renderGuestListOnly();
  };

  function updateSelectedCountUI(){
    const btn = document.getElementById("delete-selected-btn");
    if(btn){
      const n = state.selectedIds.size;
      btn.textContent = n > 0 ? `Hapus Terpilih (${n})` : "Hapus Terpilih";
      btn.disabled = n === 0;
    }
  }

  window.handleDeleteSelectedGuests = async function(){
    if(!firebaseReady){ alert("Firebase belum terhubung, tidak bisa menghapus data."); return; }
    const ids = Array.from(state.selectedIds);
    if(ids.length === 0){ alert("Belum ada tamu yang dipilih. Centang dulu nama tamu yang mau dihapus."); return; }
    const ok = confirm(`Hapus ${ids.length} tamu terpilih beserta status kehadirannya? Tindakan ini tidak bisa dibatalkan, dan berlaku untuk semua HP panitia.`);
    if(!ok) return;
    try{
      for(let i=0;i<ids.length;i+=450){
        const chunk = ids.slice(i, i+450);
        const batch = db.batch();
        chunk.forEach(id => batch.delete(db.collection(GUESTS_COLLECTION).doc(id)));
        await batch.commit();
      }
      state.guests = state.guests.filter(g => !state.selectedIds.has(g.id));
      state.selectedIds.clear();
      renderGuestListOnly();
      alert(`${ids.length} tamu berhasil dihapus.`);
    }catch(e){
      alert("Gagal menghapus data: " + ((e && e.message) ? e.message : String(e)));
    }
  };

  window.addGuest = async function(){
    const nameEl = document.getElementById("new-guest-name");
    const catEl = document.getElementById("new-guest-cat");
    const name = nameEl.value.trim();
    if(!name) return;
    const fresh = await loadGuestsFromStorage();
    const guest = {
      id: genId(fresh),
      name: name,
      category: catEl.value,
      checkedIn: false,
      checkedInAt: null,
      createdAt: Date.now(),
    };
    fresh.push(guest);
    const result = await saveGuestsToStorage(fresh);
    if(!result.ok){ alert("Gagal menyimpan tamu: " + result.message); return; }
    state.guests = fresh;
    nameEl.value = "";
    render();
  };

  window.addBulkGuests = async function(){
    const ta = document.getElementById("bulk-names");
    const catEl = document.getElementById("bulk-cat");
    const lines = ta.value.split("\n").map(s=>s.trim()).filter(Boolean);
    if(lines.length === 0) return;
    const fresh = await loadGuestsFromStorage();
    lines.forEach(name=>{
      fresh.push({
        id: genId(fresh),
        name: name,
        category: catEl.value,
        checkedIn: false,
        checkedInAt: null,
        createdAt: Date.now(),
      });
    });
    const result = await saveGuestsToStorage(fresh);
    if(!result.ok){ alert("Gagal menyimpan tamu: " + result.message); return; }
    state.guests = fresh;
    ta.value = "";
    state.bulkOpen = false;
    render();
  };

  window.openQrModal = function(id){
    const g = state.guests.find(x=>x.id===id);
    if(!g) return;
    state.modalGuest = g;
    render();
    renderQrIntoModal(g);
  };

  window.closeQrModal = function(){
    state.modalGuest = null;
    render();
  };

  async function renderQrIntoModal(guest){
    try{
      const qrDataUrl = await QRCode.toDataURL(guest.id, {
        width: 440, margin: 2,
        color:{ dark:"#2E2A25", light:"#FFFFFF" }
      });
      const img = document.getElementById("qr-modal-img");
      const dl = document.getElementById("qr-modal-download");
      if(img) img.src = qrDataUrl;

      // Ensure fonts are actually loaded before drawing text to canvas —
      // otherwise the first card generated after page load can fall back
      // to a generic system font.
      try{
        await Promise.all([
          document.fonts.load('700 40px "Playfair Display"'),
          document.fonts.load('600 22px "Manrope"'),
          document.fonts.load('600 20px "JetBrains Mono"')
        ]);
      }catch(e){ /* font API unsupported, proceed with fallback fonts */ }

      const cardDataUrl = await buildGuestCardImage(guest, qrDataUrl);
      if(dl){
        dl.href = cardDataUrl;
        dl.download = guest.name.replace(/[^a-z0-9]+/gi,"-") + "-" + guest.id + ".png";
      }
    }catch(e){
      const img = document.getElementById("qr-modal-img");
      const errBox = document.getElementById("qr-modal-error");
      if(img) img.alt = "Gagal membuat QR";
      if(errBox) errBox.textContent = "Gagal membuat QR: " + ((e && e.message) ? e.message : String(e));
    }
  }

  // Draws a full guest card (matching the on-screen modal: eyebrow label,
  // name, category, QR code, and the guest code) onto an offscreen canvas
  // so "Unduh QR" saves one complete image instead of just the bare QR —
  // no more manual screenshotting needed.
  function buildGuestCardImage(guest, qrDataUrl){
    return new Promise((resolve, reject)=>{
      const W = 640, PAD = 48;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const qrImg = new Image();
      qrImg.onload = () => {
        const qrSize = W - PAD*2;
        const H = PAD + 28 + 46 + 28 + qrSize + 40 + 30 + PAD; // eyebrow + name + category + qr + code + breathing room
        canvas.width = W;
        canvas.height = H;

        // background
        ctx.fillStyle = "#FFFCF6";
        ctx.fillRect(0, 0, W, H);
        // outer border
        ctx.strokeStyle = "#EFE3CC";
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, W-20, H-20);

        let y = PAD;
        // eyebrow
        ctx.fillStyle = "#8C6D3E";
        ctx.font = "700 13px Manrope, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "alphabetic";
        const eyebrow = "KODE QR TAMU";
        // letter-spacing approximation
        drawLetterSpaced(ctx, eyebrow, W/2, y, 2.2);
        y += 40;

        // name
        ctx.fillStyle = "#2E2A25";
        ctx.font = "700 34px 'Playfair Display', serif";
        ctx.fillText(guest.name, W/2, y);
        y += 34;

        // category
        ctx.fillStyle = "#6B6255";
        ctx.font = "500 18px Manrope, sans-serif";
        ctx.fillText(guest.category, W/2, y);
        y += 36;

        // QR image
        const qrX = (W - qrSize) / 2;
        ctx.drawImage(qrImg, qrX, y, qrSize, qrSize);
        y += qrSize + 40;

        // guest code
        ctx.fillStyle = "#2E2A25";
        ctx.font = "600 22px 'JetBrains Mono', monospace";
        drawLetterSpaced(ctx, guest.id, W/2, y, 3);

        resolve(canvas.toDataURL("image/png"));
      };
      qrImg.onerror = () => reject(new Error("Gagal memuat gambar QR untuk kartu"));
      qrImg.src = qrDataUrl;
    });
  }

  // Canvas has no built-in letter-spacing, so measure+draw char by char.
  function drawLetterSpaced(ctx, text, centerX, y, spacing){
    const widths = [...text].map(ch => ctx.measureText(ch).width);
    const total = widths.reduce((a,b)=>a+b,0) + spacing * (text.length - 1);
    let x = centerX - total/2;
    const prevAlign = ctx.textAlign;
    ctx.textAlign = "left";
    [...text].forEach((ch, i) => {
      ctx.fillText(ch, x, y);
      x += widths[i] + spacing;
    });
    ctx.textAlign = prevAlign;
  }

  // ---------------- actions: scan ----------------
  let cameraStreamObj = null;
  let scanRafId = null;
  let scanCanvas = null;
  let scanCtx = null;

  window.startCamera = async function(){
    state.cameraError = null;
    try{
      if(typeof jsQR === "undefined"){
        throw new Error("Library pemindai QR gagal dimuat (cek koneksi internet atau ada pemblokir script aktif).");
      }
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        throw new Error("Browser ini tidak mendukung akses kamera.");
      }
      const video = document.getElementById("scan-video");
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });
      cameraStreamObj = stream;
      video.srcObject = stream;
      await video.play();

      if(!scanCanvas){
        scanCanvas = document.createElement("canvas");
        scanCtx = scanCanvas.getContext("2d", { willReadFrequently: true });
      }

      state.scanning = true;
      updateScanControls();
      scanLoop(video);
    }catch(e){
      state.cameraError = "Kamera tidak bisa diakses: " + ((e && e.message) ? e.message : String(e)) + " — gunakan input kode manual di bawah.";
      state.scanning = false;
      updateScanControls();
    }
  };

  function scanLoop(video){
    if(!state.scanning) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      scanCanvas.width = video.videoWidth;
      scanCanvas.height = video.videoHeight;
      scanCtx.drawImage(video, 0, 0, scanCanvas.width, scanCanvas.height);
      try{
        const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
        if(code && code.data && !state.scanLocked){
          state.scanLocked = true;
          processCode(code.data.trim().toUpperCase()).finally(()=>{
            setTimeout(()=>{ state.scanLocked = false; }, 2500);
          });
        }
      }catch(e){ /* frame read glitch, ignore and keep scanning */ }
    }
    scanRafId = requestAnimationFrame(()=>scanLoop(video));
  }

  function stopCamera(){
    state.scanning = false;
    if(scanRafId){ cancelAnimationFrame(scanRafId); scanRafId = null; }
    if(cameraStreamObj){
      try{ cameraStreamObj.getTracks().forEach(t=>t.stop()); }catch(e){ /* ignore */ }
      cameraStreamObj = null;
    }
    const video = document.getElementById("scan-video");
    if(video) video.srcObject = null;
  }

  window.stopCameraBtn = function(){
    stopCamera();
    updateScanControls();
  };

  // Updates only the idle-overlay text and the start/stop button without
  // touching the <video> element itself. Re-rendering the whole scan tab
  // (via innerHTML) after the camera starts destroys and recreates the
  // <video> node, which would detach the live camera stream that's just been
  // attached — that's why the camera preview used to stay blank/unopened.
  function updateScanControls(){
    if(state.activeTab !== "scan") return;
    const frame = document.querySelector(".scan-frame");
    if(frame){
      let idle = frame.querySelector(".scan-idle");
      if(!state.scanning){
        if(!idle){
          idle = document.createElement("div");
          idle.className = "scan-idle";
          frame.appendChild(idle);
        }
        idle.textContent = state.cameraError ? state.cameraError : 'Kamera belum aktif. Tekan "Mulai Kamera" untuk mulai scan QR tamu.';
      } else if(idle){
        idle.remove();
      }
    }
    const controls = document.querySelector(".scan-controls");
    if(controls){
      controls.innerHTML = !state.scanning
        ? `<button class="btn btn-gold" onclick="startCamera()">Mulai Kamera</button>`
        : `<button class="btn btn-outline" onclick="stopCameraBtn()">Hentikan Kamera</button>`;
    }
  }

  window.manualCheck = async function(){
    const el = document.getElementById("manual-code");
    const code = el.value.trim().toUpperCase();
    if(!code) return;
    await processCode(code);
    el.value = "";
  };

  async function processCode(code){
    const fresh = await loadGuestsFromStorage();
    const idx = fresh.findIndex(g => g.id === code);
    let result;
    if(idx === -1){
      result = { status:"invalid", code: code };
    } else {
      const g = fresh[idx];
      if(g.checkedIn){
        result = { status:"duplicate", guest: g };
      } else {
        g.checkedIn = true;
        g.checkedInAt = Date.now();
        fresh[idx] = g;
        await saveGuestsToStorage(fresh);
        result = { status:"valid", guest: g };
      }
    }
    state.guests = fresh;
    updateSealUI(result);
  }

  function sealMarkup(result){
    if(result.status === "valid"){
      return `
        <div class="seal seal-valid">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="seal-name">${escapeHtml(result.guest.name)}</div>
        <div class="seal-sub">${escapeHtml(result.guest.category)} &middot; Hadir dicatat ${fmtTime(result.guest.checkedInAt)}</div>`;
    }
    if(result.status === "duplicate"){
      return `
        <div class="seal seal-dup">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15.5 14"></polyline></svg>
        </div>
        <div class="seal-name">${escapeHtml(result.guest.name)}</div>
        <div class="seal-sub">Sudah check-in sebelumnya, ${fmtTime(result.guest.checkedInAt)}</div>`;
    }
    return `
      <div class="seal seal-invalid">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
      <div class="seal-name">Kode tidak ditemukan</div>
      <div class="seal-sub">Tamu ini tidak terdaftar di daftar undangan.</div>`;
  }

  function updateSealUI(result){
    const wrap = document.getElementById("seal-wrap");
    if(wrap) wrap.innerHTML = sealMarkup(result);
  }

  // ---------------- render ----------------
  function render(){
    const app = document.getElementById("app");
    if(state.screen === "loading"){
      app.innerHTML = `<div class="gate-wrap"><p class="hint-msg">Memuat…</p></div>`;
      return;
    }
    if(state.screen === "firebase-setup"){
      app.innerHTML = firebaseSetupScreen();
      return;
    }
    if(state.screen === "setup-pin"){
      app.innerHTML = setupPinScreen();
      return;
    }
    if(state.screen === "login"){
      app.innerHTML = loginScreen();
      return;
    }
    app.innerHTML = dashboardScreen();
    if(state.activeTab === "guests") attachGuestListEvents();
    if(state.modalGuest) attachModalEvents();
  }

  function flourishSvg(){
    return `<svg class="flourish" viewBox="0 0 120 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 12 C 30 2, 45 22, 60 12 C 75 2, 90 22, 118 12" stroke="#AD8A55" stroke-width="1.2"/>
      <circle cx="60" cy="12" r="3" fill="#AD8A55"/>
    </svg>`;
  }

  function firebaseSetupScreen(){
    const notConfigured = firebaseInitError === "not-configured";
    return `
    <div class="gate-wrap">
      <div class="gate-card">
        ${flourishSvg()}
        <div class="eyebrow">Perlu Disetel Dulu</div>
        <h1 class="gate-title display">${notConfigured ? "Firebase Belum Diisi" : "Firebase Gagal Terhubung"}</h1>
        <p class="gate-sub" style="text-align:left;">
          ${notConfigured
            ? "Supaya PIN dan daftar tamu tersimpan &amp; tersinkron di semua HP panitia, aplikasi ini butuh database Firebase (gratis). Buka file HTML ini di editor teks, cari bagian <span class=\"mono\">FIREBASE_CONFIG</span> di dekat awal &lt;script&gt;, lalu isi sesuai instruksi di komentar tepat di atasnya. Setelah diisi, upload ulang file-nya."
            : escapeHtml(storageNotReadyMessage())}
        </p>
        <p class="hint-msg" style="text-align:left;">Ringkas: buat project di console.firebase.google.com &rarr; aktifkan Firestore Database (mode test) &rarr; Project settings &rarr; tambah Web app &rarr; salin config-nya ke file ini.</p>
      </div>
    </div>`;
  }

  function setupPinScreen(){
    return `
    <div class="gate-wrap">
      <div class="gate-card">
        ${flourishSvg()}
        <div class="eyebrow">Untuk Panitia</div>
        <h1 class="gate-title display">Atur PIN Akses</h1>
        <p class="gate-sub">Buat PIN untuk perangkat panitia agar hanya kalian yang bisa melihat daftar tamu dan melakukan check-in.</p>
        <div class="field">
          <label>PIN baru</label>
          <input type="password" id="setup-pin-1" placeholder="Minimal 4 karakter" inputmode="numeric">
        </div>
        <div class="field">
          <label>Ulangi PIN</label>
          <input type="password" id="setup-pin-2" placeholder="Ketik ulang PIN">
        </div>
        <button class="btn btn-gold" onclick="handleSetupPin()">Simpan PIN</button>
        <div class="error-msg" id="setup-pin-error"></div>
        <p class="hint-msg">PIN ini dipakai oleh semua panitia di berbagai perangkat &mdash; bagikan hanya ke tim yang bertugas.</p>
      </div>
    </div>`;
  }

  function loginScreen(){
    return `
    <div class="gate-wrap">
      <div class="gate-card">
        ${flourishSvg()}
        <div class="eyebrow">Untuk Panitia</div>
        <h1 class="gate-title display">Check-in Tamu</h1>
        <p class="gate-sub">Masukkan PIN panitia untuk membuka daftar tamu dan mode scan kedatangan.</p>
        <div class="field">
          <label>PIN Panitia</label>
          <input type="password" id="login-pin" placeholder="Masukkan PIN" onkeydown="if(event.key==='Enter')handleLogin()">
        </div>
        <button class="btn btn-gold" onclick="handleLogin()">Masuk</button>
        ${state.loginError ? '<div class="error-msg">PIN salah, coba lagi.</div>' : ''}
      </div>
    </div>`;
  }

  function dashboardScreen(){
    const total = state.guests.length;
    const hadir = state.guests.filter(g=>g.checkedIn).length;
    return `
    <header class="top">
      <div>
        <h1 class="display">Check-in Tamu Pernikahan</h1>
        <div class="stat">${hadir} dari ${total} tamu sudah hadir</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()">Keluar</button>
    </header>
    <div class="tabs">
      <div class="tab ${state.activeTab==='guests'?'active':''}" onclick="setTab('guests')">Daftar Tamu</div>
      <div class="tab ${state.activeTab==='scan'?'active':''}" onclick="setTab('scan')">Scan Kedatangan</div>
    </div>
    <main class="content">
      ${state.activeTab === 'guests' ? guestsTab() : scanTab()}
    </main>
    ${state.modalGuest ? qrModal(state.modalGuest) : ''}
    `;
  }

  function guestsTab(){
    return `
    <div class="panel">
      <h2>Tambah Tamu</h2>
      <div class="row-2">
        <div class="field">
          <label>Nama tamu</label>
          <input type="text" id="new-guest-name" placeholder="Nama lengkap tamu" onkeydown="if(event.key==='Enter')addGuest()">
        </div>
      </div>
      <div class="row-2">
        <div class="field" style="max-width:160px;">
          <label>Kategori</label>
          <select id="new-guest-cat">${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
        </div>
        <div class="field" style="flex:0 0 auto;align-self:flex-end;">
          <button class="btn btn-gold btn-sm" onclick="addGuest()">Tambah</button>
        </div>
      </div>
      <span class="toggle-bulk" onclick="toggleBulk()">${state.bulkOpen ? 'Tutup tambah banyak sekaligus' : '+ Tambah banyak tamu sekaligus'}</span>
      ${state.bulkOpen ? `
        <div style="margin-top:12px;">
          <div class="field">
            <label>Satu nama per baris</label>
            <textarea id="bulk-names" rows="5" placeholder="Contoh:\nBudi Santoso\nSiti Aminah\nKeluarga Pak Joko"></textarea>
          </div>
          <div class="row-2">
            <div class="field" style="max-width:160px;">
              <label>Kategori</label>
              <select id="bulk-cat">${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
            </div>
            <div class="field" style="flex:0 0 auto;align-self:flex-end;">
              <button class="btn btn-gold btn-sm" onclick="addBulkGuests()">Tambah Semua</button>
            </div>
          </div>
        </div>` : ''}
    </div>
    <div class="panel">
      <h2>Daftar Tamu</h2>
      <div class="guest-search field">
        <input type="text" placeholder="Cari nama tamu…" oninput="handleSearch(this.value)">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--charcoal-soft);font-weight:600;">
          <input type="checkbox" onchange="toggleSelectAllVisible(this.checked)"> Pilih semua yang tampil
        </label>
        <button id="delete-selected-btn" class="btn btn-danger btn-sm" onclick="handleDeleteSelectedGuests()" disabled>Hapus Terpilih</button>
      </div>
      <div id="guest-list-area">${guestListMarkup()}</div>
    </div>`;
  }

  function guestListMarkup(){
    const q = state.search.trim().toLowerCase();
    const list = state.guests
      .filter(g => !q || g.name.toLowerCase().includes(q))
      .sort((a,b)=> a.name.localeCompare(b.name));
    if(list.length === 0){
      return `<div class="empty-state">${state.guests.length===0
        ? 'Belum ada tamu tercatat. Tambahkan nama tamu pertama di formulir di atas.'
        : 'Tidak ada tamu yang cocok dengan pencarian.'}</div>`;
    }
    return list.map(g => `
      <div class="guest-item">
        <input type="checkbox" class="guest-select-cb" ${state.selectedIds.has(g.id) ? 'checked' : ''} onchange="toggleGuestSelect('${g.id}', this.checked)" style="margin-right:10px;flex:0 0 auto;width:18px;height:18px;">
        <div>
          <div class="guest-name">${escapeHtml(g.name)}</div>
          <div class="guest-meta">${escapeHtml(g.category)} &middot; <span class="mono">${g.id}</span></div>
        </div>
        <div class="guest-actions">
          <span class="badge ${g.checkedIn ? 'badge-hadir' : 'badge-belum'}">${g.checkedIn ? 'Sudah hadir' : 'Belum hadir'}</span>
          <button class="btn btn-outline btn-sm" onclick="openQrModal('${g.id}')">Lihat QR</button>
        </div>
      </div>`).join('');
  }

  function renderGuestListOnly(){
    const area = document.getElementById("guest-list-area");
    if(area) area.innerHTML = guestListMarkup();
    const statEl = document.querySelector("header.top .stat");
    if(statEl){
      const total = state.guests.length;
      const hadir = state.guests.filter(g=>g.checkedIn).length;
      statEl.textContent = `${hadir} dari ${total} tamu sudah hadir`;
    }
  }

  function attachGuestListEvents(){ /* handlers are inline via onclick; nothing extra needed */ }

  function scanTab(){
    return `
    <div class="panel" style="text-align:center;">
      <h2 style="text-align:left;">Scan QR Tamu</h2>
      <div class="scan-frame">
        <video id="scan-video" muted playsinline></video>
        ${!state.scanning ? `<div class="scan-idle">${state.cameraError ? state.cameraError : 'Kamera belum aktif. Tekan "Mulai Kamera" untuk mulai scan QR tamu.'}</div>` : ''}
      </div>
      <div class="scan-controls">
        ${!state.scanning
          ? `<button class="btn btn-gold" onclick="startCamera()">Mulai Kamera</button>`
          : `<button class="btn btn-outline" onclick="stopCameraBtn()">Hentikan Kamera</button>`}
      </div>
      <div id="seal-wrap" class="seal-wrap"></div>
      <div class="manual-check">
        <label>Atau masukkan kode tamu secara manual</label>
        <div class="manual-row">
          <input type="text" id="manual-code" class="mono" placeholder="Contoh: W-7K3P2Q" onkeydown="if(event.key==='Enter')manualCheck()" style="text-transform:uppercase;">
          <button class="btn btn-gold btn-sm" onclick="manualCheck()">Cek</button>
        </div>
      </div>
    </div>`;
  }

  function renderScanTabOnly(){
    if(state.activeTab !== "scan") return;
    const main = document.querySelector("main.content");
    if(main) main.innerHTML = scanTab();
  }

  function qrModal(g){
    return `
    <div class="overlay" onclick="if(event.target===this)closeQrModal()">
      <div class="modal">
        <div class="eyebrow">Kode QR Tamu</div>
        <div class="display" style="font-size:19px;font-weight:700;">${escapeHtml(g.name)}</div>
        <div class="guest-meta">${escapeHtml(g.category)}</div>
        <img id="qr-modal-img" alt="QR Code" src="">
        <div class="error-msg" id="qr-modal-error"></div>
        <div class="code mono">${g.id}</div>
        <p class="hint-msg" style="margin-top:10px;">Di HP, kalau tombol unduh tidak langsung menyimpan: tekan &amp; tahan gambar QR di atas, lalu pilih "Simpan Gambar" / "Add to Photos".</p>
        <div style="display:flex;gap:10px;margin-top:12px;">
          <a id="qr-modal-download" class="btn btn-gold" href="#" download onclick="return handleQrDownloadClick(event)">Unduh QR</a>
          <button class="btn btn-outline" onclick="closeQrModal()">Tutup</button>
        </div>
      </div>
    </div>`;
  }

  window.handleQrDownloadClick = function(ev){
    const link = ev.currentTarget;
    const href = link.getAttribute("href");
    if(!href || href === "#"){ ev.preventDefault(); return false; }
    // Some mobile browsers (notably iOS Safari) ignore the download attribute
    // and just navigate instead. Opening in a new tab still lets the user
    // long-press / share-save the image even when auto-download doesn't fire.
    const isLikelyIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isLikelyIOS){
      ev.preventDefault();
      window.open(href, "_blank");
      return false;
    }
    return true;
  };

  function attachModalEvents(){ /* inline handlers used */ }

  init();
})();
</script>
</body>
</html>
